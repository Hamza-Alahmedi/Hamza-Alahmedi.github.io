<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f5f5f5;
            text-align: center;
        }
        .card {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        p {
            color: #555;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #007acc;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
        a:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to My Website</h1>
        <p>This is a simple page hosted on GitHub Pages.</p>
        <a href="/https://github.com/Hamza-Alahmedi">Visit my GitHub</a>
    </div>
</body>
</html>
